name: Fleet Status Aggregator

on:
  repository_dispatch:
    types: [fleet_status_update]

# Ensure only one aggregator runs at a time to prevent git push collisions
concurrency:
  group: fleet-status-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hub
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Update JSON Status
        run: |
          echo "Received payload:"
          echo '${{ toJSON(github.event.client_payload) }}'
          
          # Initialize if not exists
          if [ ! -f fleet-status.json ]; then
            echo "{}" > fleet-status.json
          fi
          
          # Merge new status using jq
          jq --arg repo "${{ github.event.client_payload.repository }}" \
             --arg status "${{ github.event.client_payload.status }}" \
             --arg conclusion "${{ github.event.client_payload.conclusion }}" \
             --arg url "${{ github.event.client_payload.url }}" \
             '.[$repo] = {status: $status, conclusion: $conclusion, url: $url, timestamp: (now | todate)}' \
             fleet-status.json > tmp.json && mv tmp.json fleet-status.json

      - name: Commit Status Update
        run: |
          git config --global user.name "GitHub Actions Aggregator"
          git config --global user.email "actions@github.com"
          git add fleet-status.json
          git commit -m "chore: update fleet status for ${{ github.event.client_payload.repository }}" || echo "No changes"
          
          # Retry push in case of race conditions
          for i in {1..5}; do
            git pull --rebase origin master
            git push origin master && break || sleep 5
          done
